# ─────────────────────────────────────────────────────────────────────────────
# ClopsFlow — Deployment Workflow
# Stack    : Static Frontend
# Deploy   : Docker SSH
# Infra    : Servidor existente
# Puerto   : 80
#
# Auto-generado por ClopsFlow. No modificar manualmente — usar "Sync to GitHub"
# para regenerar si cambia la configuración del repo.
# ─────────────────────────────────────────────────────────────────────────────
name: ClopsFlow Deploy

on:
  push:
    branches: [main, staging]
  workflow_dispatch:

jobs:
  deploy:
    name: "Deploy · Static Frontend · Docker SSH"
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # ── PASO 1: Verificar suscripción activa ──────────────────────────────────
      # Kill-switch: si la cuenta está suspendida → exit 1 inmediato.
      - name: Verify ClopsFlow subscription
        id: verify
        run: |
          RESPONSE=$(curl -sf -w "\n%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CLOPSFLOW_DEPLOY_KEY }}" \
            "${{ secrets.CLOPSFLOW_API_URL }}/api/deploy/verify?repoId=${{ secrets.CLOPSFLOW_REPO_ID }}" || echo "\n000")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Acceso denegado (HTTP $HTTP_CODE): $BODY"
            exit 1
          fi
          INFRA_PROVISIONED=$(python3 -c "import sys,json; d=json.load(sys.stdin); print(str(d.get('infraProvisioned',False)).lower())" <<< "$BODY")
          VPS_IP=$(python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('vpsIp',''))" <<< "$BODY")
          echo "infra_provisioned=$INFRA_PROVISIONED" >> $GITHUB_OUTPUT
          echo "vps_ip=$VPS_IP"                       >> $GITHUB_OUTPUT
          echo "✅ Suscripción activa | Infra provisionada: $INFRA_PROVISIONED"

      # ── PASO 2: Checkout del repo del cliente ─────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.CLOPSFLOW_GITHUB_TOKEN || github.token }}
          path: client-repo

      # ── PASO 3: SSH Agent — acceso a repos privados de Clopstech ─────────────
      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.CLOPSTECH_SSH_KEY }}

      # ── PASO 4: Clonar scripts-template ──────────────────────────────────────
      - name: Clone scripts-template
        run: |
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null || true
          git clone git@github.com:Clopstech/scripts-template.git clopstech-scripts
          echo "✅ scripts-template clonado"

      # ════════════════════════════════════════════════════════════════════════
      #  Build Docker image — stack: Static Frontend
      # ════════════════════════════════════════════════════════════════════════

      - name: Write .env into build context
        working-directory: client-repo
        run: |
          echo '${{ secrets.CLOPSFLOW_APP_ENV_VARS }}' | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          with open('.env', 'w') as f:
              for k, v in data.items():
                  f.write(f'{k}={v}\n')
          print(f'✅ .env: {len(data)} variables')
          "

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.CLOPSFLOW_GITHUB_TOKEN || github.token }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: client-repo
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ════════════════════════════════════════════════════════════════════════
      #  FASE 2 — Deploy via scripts-template
      # ════════════════════════════════════════════════════════════════════════

      # ── Resolver IP del VPS ────────────────────────────────────────────────────
      # Prioridad: output de TF (este run) > vpsIp del /verify (ya provisionado) > DEPLOY_HOST manual
      - name: Resolve VPS IP
        id: vps
        run: |
          TARGET="${{ env.vps_ip }}"
          [ -z "$TARGET" ] && TARGET="${{ steps.verify.outputs.vps_ip }}"
          [ -z "$TARGET" ] && TARGET="${{ secrets.DEPLOY_HOST }}"
          echo "ip=$TARGET" >> $GITHUB_OUTPUT
          [ -n "$TARGET" ] && echo "✅ VPS target: $TARGET" || echo "⚠️  Sin VPS IP — deploy omitido"

      - name: Deploy (Docker SSH)
        if: steps.vps.outputs.ip != ''
        env:
          VPS_IP: ${{ steps.vps.outputs.ip }}
          IMAGE: ghcr.io/${{ github.repository }}:${{ github.sha }}
          APP_PORT: 80
          SSH_PRIVATE_KEY: ${{ secrets.TF_VAR_SSH_PRIVATE_KEY }}
          REGISTRY_USER: ${{ github.repository_owner }}
          REGISTRY_TOKEN: ${{ secrets.CLOPSFLOW_GITHUB_TOKEN || github.token }}
        run: bash clopstech-scripts/deploy-docker.sh

      # ── Notificación y resumen ────────────────────────────────────────────────
      - name: Notify ClopsFlow
        if: always()
        run: |
          STATUS=${{ job.status == 'success' && 'success' || 'error' }}
          curl -sf -X POST "${{ secrets.CLOPSFLOW_API_URL }}/api/deploy/update-state" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CLOPSFLOW_DEPLOY_KEY }}" \
            -d "{"repoId":"${{ secrets.CLOPSFLOW_REPO_ID }}","status":"$STATUS","commitId":"${{ github.sha }}"}" || true

      - name: Summary
        if: always()
        run: |
          {
            echo "### 🚀 ClopsFlow Deploy"
            echo "| | |"
            echo "|---|---|"
            echo "| Commit | `${{ github.sha }}` |"
            echo "| Rama | `${{ github.ref_name }}` |"
            echo "| Stack | Static Frontend |"
            echo "| Deploy | Docker SSH |"
            echo "| Infra | Servidor existente |"
            echo "| Puerto | 80 |"
          } >> $GITHUB_STEP_SUMMARY
